<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede9;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #9e9e9a;
      --border-subtle: rgba(0,0,0,0.10);
      --border-mid: rgba(0,0,0,0.18);
      --border-strong: rgba(0,0,0,0.28);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2e2e2b;
        --text-primary: #f0efe9;
        --text-secondary: #a0a09a;
        --text-tertiary: #6e6e68;
        --border-subtle: rgba(255,255,255,0.08);
        --border-mid: rgba(255,255,255,0.14);
        --border-strong: rgba(255,255,255,0.22);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 780px; margin: 0 auto; }

    /* Auth screen */
    .auth-wrap {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 2rem 1rem; margin: -2rem -1rem;
    }
    .auth-card {
      background: var(--bg-primary); border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-lg); padding: 2rem;
      width: 100%; max-width: 380px;
    }
    .auth-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 4px; }
    .auth-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 1.5rem; }
    .auth-tabs { display: flex; margin-bottom: 1.5rem; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); overflow: hidden; }
    .auth-tab {
      flex: 1; padding: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; background: transparent; border: none;
      color: var(--text-secondary); font-family: var(--font);
    }
    .auth-tab.active { background: var(--text-primary); color: var(--bg-primary); }
    .auth-field { margin-bottom: 1rem; }
    .auth-field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; }
    .auth-field input {
      width: 100%; border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md); padding: 9px 12px;
      font-size: 14px; background: var(--bg-primary);
      color: var(--text-primary); font-family: var(--font);
    }
    .auth-field input:focus { outline: none; border-color: var(--border-strong); }
    .auth-btn {
      width: 100%; background: var(--text-primary); color: var(--bg-primary);
      border: none; border-radius: var(--radius-md);
      padding: 10px; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: var(--font); margin-top: 4px;
    }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-msg { font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }
    .auth-msg.error { color: #E24B4A; }
    .auth-msg.success { color: #1D9E75; }

    /* Header */
    .header {
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap;
      gap: 12px; margin-bottom: 1.5rem;
    }
    .app-title { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
    .app-subtitle { font-size: 14px; color: var(--text-secondary); margin-top: 3px; }
    .header-btns { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .add-btn {
      background: var(--text-primary); color: var(--bg-primary);
      border: none; border-radius: var(--radius-md);
      padding: 9px 18px; font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      white-space: nowrap; font-family: var(--font);
    }
    .add-btn:hover { opacity: 0.85; }
    .import-btn {
      background: transparent; color: var(--text-primary);
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      padding: 9px 18px; font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      white-space: nowrap; font-family: var(--font);
    }
    .import-btn:hover { background: var(--bg-secondary); }
    .signout-btn {
      background: transparent; color: var(--text-tertiary);
      border: 0.5px solid var(--border-subtle); border-radius: var(--radius-md);
      padding: 9px 14px; font-size: 13px; cursor: pointer;
      white-space: nowrap; font-family: var(--font);
    }
    .signout-btn:hover { color: var(--text-secondary); border-color: var(--border-mid); }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: var(--text-primary); color: var(--bg-primary);
      padding: 10px 20px; border-radius: var(--radius-md);
      font-size: 14px; font-weight: 500; z-index: 999;
      opacity: 0; transition: opacity 0.2s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* Stats */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px; margin-bottom: 1.25rem;
    }
    .stat-card {
      background: var(--bg-primary); border-radius: var(--radius-md);
      border: 0.5px solid var(--border-subtle); padding: 12px 14px;
    }
    .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .stat-value { font-size: 24px; font-weight: 600; }

    /* Filters */
    .filters { display: flex; gap: 7px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 13px; color: var(--text-secondary); margin-right: 2px; }
    .filter-btn {
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      padding: 5px 13px; font-size: 13px; cursor: pointer;
      background: transparent; color: var(--text-secondary); font-family: var(--font);
    }
    .filter-btn.active { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
    .filter-btn:hover:not(.active) { border-color: var(--border-strong); color: var(--text-primary); }
    .search-box {
      margin-left: auto; border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      padding: 6px 12px; font-size: 13px; background: var(--bg-primary);
      color: var(--text-primary); font-family: var(--font); width: 190px;
    }
    .search-box:focus { outline: none; border-color: var(--border-strong); }

    /* Job cards */
    .jobs-list { display: flex; flex-direction: column; gap: 10px; }
    .job-card {
      background: var(--bg-primary); border: 0.5px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 1rem 1.25rem;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .job-card:hover { border-color: var(--border-mid); }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .job-main { flex: 1; min-width: 0; }
    .job-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .job-title { font-size: 15px; font-weight: 500; }
    .job-company { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .status-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 100px; white-space: nowrap; flex-shrink: 0; }
    .job-meta { display: flex; align-items: center; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
    .job-date { font-size: 12px; color: var(--text-tertiary); }
    .job-link { font-size: 12px; color: #378ADD; text-decoration: none; }
    .job-link:hover { text-decoration: underline; }
    .job-notes { font-size: 12px; color: var(--text-tertiary); font-style: italic; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 520px; }
    .job-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      background: none; border: 0.5px solid var(--border-subtle);
      border-radius: var(--radius-md); width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-secondary); font-size: 14px;
    }
    .icon-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .empty-state { text-align: center; padding: 4rem 1rem; }
    .empty-title { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
    .empty-sub { font-size: 14px; color: var(--text-secondary); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 1rem;
    }
    .modal {
      background: var(--bg-primary); border-radius: var(--radius-lg);
      border: 0.5px solid var(--border-mid); padding: 1.5rem;
      width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 18px; font-weight: 500; margin-bottom: 1.25rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; }
    .field input, .field select, .field textarea {
      width: 100%; border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md); padding: 8px 10px;
      font-size: 14px; background: var(--bg-primary);
      color: var(--text-primary); font-family: var(--font);
    }
    .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--border-strong); }
    .field textarea { resize: vertical; min-height: 72px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel {
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      padding: 8px 16px; font-size: 14px; cursor: pointer;
      background: transparent; color: var(--text-secondary); font-family: var(--font);
    }
    .btn-cancel:hover { background: var(--bg-secondary); }
    .btn-save {
      background: var(--text-primary); color: var(--bg-primary);
      border: none; border-radius: var(--radius-md);
      padding: 8px 18px; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: var(--font);
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Confirm */
    .confirm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 1rem;
    }
    .confirm-box {
      background: var(--bg-primary); border-radius: var(--radius-lg);
      border: 0.5px solid var(--border-mid); padding: 1.5rem;
      width: 100%; max-width: 360px;
    }
    .confirm-box p { font-size: 14px; color: var(--text-secondary); margin: 6px 0 1.25rem; }
    .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-danger {
      background: #E24B4A; color: #fff; border: none;
      border-radius: var(--radius-md); padding: 8px 16px;
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font);
    }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 200px; color: var(--text-secondary); font-size: 14px; gap: 10px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border-mid); border-top-color: var(--text-secondary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 540px) {
      .search-box { margin-left: 0; width: 100%; }
      .filter-label { display: none; }
    }
  </style>
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen" class="auth-wrap" style="display:none;">
    <div class="auth-card">
      <div class="auth-title">Job tracker</div>
      <div class="auth-sub">Sign in to access your applications from any device.</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign in</button>
        <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
      </div>
      <div class="auth-field"><label>Email</label><input type="email" id="auth-email" placeholder="you@example.com" /></div>
      <div class="auth-field"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••" /></div>
      <button class="auth-btn" id="auth-submit" onclick="handleAuth()">Sign in</button>
      <div class="auth-msg" id="auth-msg"></div>
    </div>
  </div>

  <!-- Main app -->
  <div id="app-screen" class="container" style="display:none;">
    <div class="header">
      <div>
        <div class="app-title">Job tracker</div>
        <div class="app-subtitle" id="app-count">0 applications</div>
      </div>
      <div class="header-btns">
        <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="handleCSV(event)" />
        <button class="import-btn" onclick="document.getElementById('csv-input').click()">&#8593; Import CSV</button>
        <button class="import-btn" onclick="exportCSV()">&#8595; Export CSV</button>
        <button class="add-btn" onclick="openAdd()"><span style="font-size:19px;line-height:1;">+</span> Add job</button>
        <button class="signout-btn" onclick="signOut()">Sign out</button>
      </div>
    </div>
    <div id="toast" class="toast"></div>
    <div class="stats-row" id="stats-row"></div>
    <div class="filters">
      <span class="filter-label">Filter:</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('Wishlist',this)">Wishlist</button>
      <button class="filter-btn" onclick="setFilter('Applied',this)">Applied</button>
      <button class="filter-btn" onclick="setFilter('Interview',this)">Interviewing</button>
      <button class="filter-btn" onclick="setFilter('Offer',this)">Offers</button>
      <button class="filter-btn" onclick="setFilter('Rejected',this)">Rejected</button>
      <input class="search-box" type="text" placeholder="Search..." id="search-box" oninput="renderList()" />
    </div>
    <div class="jobs-list" id="jobs-list">
      <div class="loading"><div class="spinner"></div> Loading your jobs…</div>
    </div>
  </div>

  <!-- Add / Edit modal -->
  <div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="modal-title">Add job</div>
      <div class="field"><label>Job title *</label><input id="f-title" type="text" placeholder="e.g. Senior Software Engineer" /></div>
      <div class="field"><label>Company *</label><input id="f-company" type="text" placeholder="e.g. Acme Corp" /></div>
      <div class="field"><label>Job posting URL</label><input id="f-url" type="url" placeholder="https://..." /></div>
      <div class="field"><label>Status</label>
        <select id="f-status">
          <option value="Wishlist">Wishlist — want to apply</option>
          <option value="Applied">Applied</option>
          <option value="Phone Screen">Phone screen</option>
          <option value="Interview">Interviewing</option>
          <option value="Final Round">Final round</option>
          <option value="Offer">Offer received</option>
          <option value="Rejected">Rejected</option>
          <option value="Withdrawn">Withdrawn</option>
        </select>
      </div>
      <div class="field"><label>Date applied</label><input id="f-date" type="date" /></div>
      <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Recruiter name, salary range, interview format..."></textarea></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" id="btn-save" onclick="saveJob()">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete confirm -->
  <div id="confirm" class="confirm-overlay" style="display:none;">
    <div class="confirm-box">
      <div style="font-size:15px;font-weight:500;">Remove this job?</div>
      <p>This cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn-cancel" onclick="document.getElementById('confirm').style.display='none'">Cancel</button>
        <button class="btn-danger" onclick="confirmDelete()">Remove</button>
      </div>
    </div>
  </div>

<script type="module">
  // ─────────────────────────────────────────────────────────
  // PASTE YOUR SUPABASE CREDENTIALS HERE
  const SUPABASE_URL  = 'https://kpnrvvutdequfhjvmbic.supabase.co';      // e.g. https://abcdefgh.supabase.co
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwbnJ2dnV0ZGVxdWZoanZtYmljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDgzMTgsImV4cCI6MjA4OTY4NDMxOH0.SJudCyz8AM9SpD9vBlWFXdaJo_LORnA-pQaRiD0whBw'; // starts with eyJ...
  // ─────────────────────────────────────────────────────────

  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  // State
  let jobs = [];
  let editingId = null;
  let deleteId  = null;
  let currentFilter = 'all';
  let currentUser = null;

  const STATUS_CONFIG = {
    'Wishlist':     { dot:'#888780', bg:'#F1EFE8', text:'#444441' },
    'Applied':      { dot:'#378ADD', bg:'#E6F1FB', text:'#0C447C' },
    'Phone Screen': { dot:'#639922', bg:'#EAF3DE', text:'#27500A' },
    'Interview':    { dot:'#EF9F27', bg:'#FAEEDA', text:'#633806' },
    'Final Round':  { dot:'#D4537E', bg:'#FBEAF0', text:'#72243E' },
    'Offer':        { dot:'#1D9E75', bg:'#E1F5EE', text:'#085041' },
    'Rejected':     { dot:'#E24B4A', bg:'#FCEBEB', text:'#791F1F' },
    'Withdrawn':    { dot:'#B4B2A9', bg:'#F1EFE8', text:'#5F5E5A' },
  };

  const STATS = [
    { key:'Applied',   label:'Applied' },
    { key:'Interview', label:'Interviewing' },
    { key:'Offer',     label:'Offers' },
    { key:'Rejected',  label:'Rejected' },
  ];

  // Helpers
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(d) {
    if (!d) return '';
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }
  function interviewStatuses() { return ['Phone Screen','Interview','Final Round']; }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
  function showScreen(which) {
    document.getElementById('auth-screen').style.display = which === 'auth' ? 'flex' : 'none';
    document.getElementById('app-screen').style.display  = which === 'app'  ? 'block' : 'none';
  }

  // Auth
  window.switchTab = function(tab) {
    const signin = tab === 'signin';
    document.getElementById('tab-signin').classList.toggle('active', signin);
    document.getElementById('tab-signup').classList.toggle('active', !signin);
    document.getElementById('auth-submit').textContent = signin ? 'Sign in' : 'Create account';
    const msg = document.getElementById('auth-msg');
    msg.textContent = ''; msg.className = 'auth-msg';
  };

  window.handleAuth = async function() {
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const signin   = document.getElementById('tab-signin').classList.contains('active');
    const btn      = document.getElementById('auth-submit');
    const msgEl    = document.getElementById('auth-msg');
    if (!email || !password) { msgEl.textContent = 'Please enter your email and password.'; msgEl.className = 'auth-msg error'; return; }
    btn.disabled = true;
    btn.textContent = signin ? 'Signing in…' : 'Creating account…';
    msgEl.textContent = '';
    const { error } = signin
      ? await sb.auth.signInWithPassword({ email, password })
      : await sb.auth.signUp({ email, password });
    btn.disabled = false;
    btn.textContent = signin ? 'Sign in' : 'Create account';
    if (error) { msgEl.textContent = error.message; msgEl.className = 'auth-msg error'; }
    else if (!signin) { msgEl.textContent = 'Account created! Check your email to confirm, then sign in.'; msgEl.className = 'auth-msg success'; }
  };

  window.signOut = async function() {
    await sb.auth.signOut();
    jobs = []; currentUser = null;
    showScreen('auth');
  };

  // Database
  async function loadJobs() {
    const { data, error } = await sb.from('jobs').select('*').order('created_at', { ascending: false });
    if (error) { showToast('Error loading jobs: ' + error.message); return; }
    jobs = (data || []).map(row => ({
      id:      row.id,
      title:   row.title   || '',
      company: row.company || '',
      url:     row.url     || '',
      status:  row.status  || 'Wishlist',
      date:    row.date_applied || '',
      notes:   row.notes   || '',
    }));
    render();
  }

  // Render
  function renderStats() {
    const total = jobs.length;
    document.getElementById('app-count').textContent = total + ' application' + (total !== 1 ? 's' : '');
    const html = STATS.map(s => {
      const count = s.key === 'Interview'
        ? jobs.filter(j => interviewStatuses().includes(j.status)).length
        : jobs.filter(j => j.status === s.key).length;
      return `<div class="stat-card"><div class="stat-label">${s.label}</div><div class="stat-value">${count}</div></div>`;
    }).join('');
    document.getElementById('stats-row').innerHTML =
      `<div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>` + html;
  }

  function filterMatch(j) {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'Interview') return interviewStatuses().includes(j.status);
    return j.status === currentFilter;
  }

  function searchMatch(j) {
    const q = document.getElementById('search-box').value.toLowerCase();
    if (!q) return true;
    return (j.title + j.company + (j.notes||'')).toLowerCase().includes(q);
  }

  function renderList() {
    const el = document.getElementById('jobs-list');
    const visible = jobs.filter(j => filterMatch(j) && searchMatch(j));
    if (!visible.length) {
      el.innerHTML = `<div class="empty-state">
        <div class="empty-title">${jobs.length ? 'No matches' : 'No jobs yet'}</div>
        <div class="empty-sub">${jobs.length ? 'Try a different filter or search.' : 'Click "Add job" to get started.'}</div>
      </div>`;
      return;
    }
    el.innerHTML = visible.map(j => {
      const c = STATUS_CONFIG[j.status] || STATUS_CONFIG['Wishlist'];
      return `<div class="job-card">
        <div class="status-dot" style="background:${c.dot}"></div>
        <div class="job-main">
          <div class="job-top">
            <div>
              <div class="job-title">${esc(j.title)}</div>
              <div class="job-company">${esc(j.company)}</div>
            </div>
            <span class="status-badge" style="background:${c.bg};color:${c.text}">${esc(j.status)}</span>
          </div>
          ${j.notes ? `<div class="job-notes">${esc(j.notes)}</div>` : ''}
          <div class="job-meta">
            ${j.date ? `<span class="job-date">Applied ${fmt(j.date)}</span>` : ''}
            ${j.url ? `<a class="job-link" href="${esc(j.url)}" target="_blank" rel="noopener">View posting ↗</a>` : ''}
          </div>
        </div>
        <div class="job-actions">
          <button class="icon-btn" title="Edit" onclick="window._openEdit('${esc(j.id)}')">✎</button>
          <button class="icon-btn" title="Remove" onclick="window._askDelete('${esc(j.id)}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  function render() { renderStats(); renderList(); }

  window.setFilter = function(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  };

  // Add / Edit
  window.openAdd = function() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add job';
    ['title','company','url','notes'].forEach(k => document.getElementById('f-'+k).value = '');
    document.getElementById('f-status').value = 'Wishlist';
    document.getElementById('f-date').value = '';
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('f-title').focus();
  };

  document.getElementById('f-status').addEventListener('change', function() {
    const df = document.getElementById('f-date');
    if (this.value !== 'Wishlist' && !df.value) df.value = new Date().toISOString().split('T')[0];
    if (this.value === 'Wishlist') df.value = '';
  });

  window._openEdit = function(id) {
    const j = jobs.find(x => x.id === id);
    if (!j) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit job';
    document.getElementById('f-title').value   = j.title;
    document.getElementById('f-company').value = j.company;
    document.getElementById('f-url').value     = j.url;
    document.getElementById('f-status').value  = j.status;
    document.getElementById('f-date').value    = j.date;
    document.getElementById('f-notes').value   = j.notes;
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('f-title').focus();
  };

  window.closeModal = function() { document.getElementById('modal').style.display = 'none'; };

  window.saveJob = async function() {
    const title   = document.getElementById('f-title').value.trim();
    const company = document.getElementById('f-company').value.trim();
    if (!title || !company) { alert('Job title and company are required.'); return; }
    const btn = document.getElementById('btn-save');
    btn.disabled = true; btn.textContent = 'Saving…';
    const payload = {
      title, company,
      url:          document.getElementById('f-url').value.trim(),
      status:       document.getElementById('f-status').value,
      date_applied: document.getElementById('f-date').value || null,
      notes:        document.getElementById('f-notes').value.trim(),
      user_id:      currentUser.id,
    };
    const { error } = editingId
      ? await sb.from('jobs').update(payload).eq('id', editingId)
      : await sb.from('jobs').insert(payload);
    btn.disabled = false; btn.textContent = 'Save';
    if (error) { showToast('Error saving: ' + error.message); return; }
    closeModal();
    await loadJobs();
    showToast(editingId ? 'Job updated.' : 'Job added.');
  };

  // Delete
  window._askDelete = function(id) {
    deleteId = id;
    document.getElementById('confirm').style.display = 'flex';
  };

  window.confirmDelete = async function() {
    const { error } = await sb.from('jobs').delete().eq('id', deleteId);
    document.getElementById('confirm').style.display = 'none';
    if (error) { showToast('Error deleting: ' + error.message); return; }
    await loadJobs();
    showToast('Job removed.');
  };

  // CSV export
  window.exportCSV = function() {
    if (!jobs.length) { showToast('No jobs to export.'); return; }
    const headers = ['Title','Company','Status','Date Applied','URL','Notes'];
    const rows = jobs.map(j =>
      [j.title, j.company, j.status, j.date, j.url, j.notes]
        .map(v => { const s = String(v||''); return (s.includes(',')||s.includes('"')||s.includes('\n')) ? '"'+s.replace(/"/g,'""')+'"' : s; })
        .join(',')
    );
    const csv  = [headers.join(','), ...rows].join('\r\n');
    const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = 'job-tracker-backup-' + new Date().toISOString().split('T')[0] + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(jobs.length + ' jobs exported.');
  };

  // CSV import
  function parseCSVLine(line) {
    const result = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch==='"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch===',' && !inQ) { result.push(cur.trim()); cur=''; }
      else cur += ch;
    }
    result.push(cur.trim());
    return result;
  }

  function inferStatus(row) {
    const submitted = (row['Submitted']||'').toLowerCase();
    const heard     = (row['Heard Back?']||'').toLowerCase();
    const offer     = (row['Offer?']||'').toLowerCase();
    if (offer.includes('yes')||offer.includes('!')) return 'Offer';
    if (heard==='bad')     return 'Rejected';
    if (heard==='good')    return 'Interview';
    if (heard==='waiting') return 'Applied';
    if (submitted==='yes') return 'Applied';
    if (submitted==='closed'||heard==='closed') return 'Withdrawn';
    return 'Wishlist';
  }

  window.handleCSV = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(ev) {
      const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { showToast('CSV appears empty.'); return; }
      const headers = parseCSVLine(lines[0]).map(h => h.replace(/^"|"$/g,''));
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const vals = parseCSVLine(lines[i]);
        if (vals.every(v => !v)) continue;
        const row = {};
        headers.forEach((h, idx) => row[h] = (vals[idx]||'').replace(/^"|"$/g,''));
        const company = (row['Name']||row['Company']||'').trim();
        const title   = (row['Role']||row['Title']||'').trim();
        if (!company && !title) continue;
        const noteParts = [];
        if (row['Interest']) noteParts.push('Interest: ' + row['Interest']);
        if (row['Notes'])    noteParts.push(row['Notes']);
        rows.push({
          user_id:      currentUser.id,
          company:      company || '(unknown)',
          title:        title   || '(unknown)',
          url:          row['Website'] || row['URL'] || '',
          status:       inferStatus(row),
          date_applied: null,
          notes:        noteParts.join(' | '),
        });
      }
      e.target.value = '';
      if (!rows.length) { showToast('No valid rows found.'); return; }
      const { error } = await sb.from('jobs').insert(rows);
      if (error) { showToast('Import error: ' + error.message); return; }
      await loadJobs();
      showToast(rows.length + ' jobs imported.');
    };
    reader.readAsText(file);
  };

  // Modal close
  document.getElementById('modal').addEventListener('click', ev => { if (ev.target===ev.currentTarget) closeModal(); });
  document.addEventListener('keydown', ev => { if (ev.key==='Escape') closeModal(); });

  // Enter key on auth form
  document.getElementById('auth-password').addEventListener('keydown', ev => { if (ev.key==='Enter') handleAuth(); });

  // Bootstrap
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    showScreen('app');
    await loadJobs();
  } else {
    showScreen('auth');
  }

  sb.auth.onAuthStateChange(async (_event, session) => {
    if (session) {
      currentUser = session.user;
      showScreen('app');
      await loadJobs();
    } else {
      currentUser = null; jobs = [];
      showScreen('auth');
    }
  });
</script>
</body>
</html>
